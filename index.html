<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ekklesía</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #fff; color: #000; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
    }

    .menu-btn {
      font-size: 24px;
      cursor: pointer;
    }

    .menu {
      position: fixed;
      top: 0;
      right: -100%;
      width: 70%;
      height: 100%;
      background: #000;
      color: #fff;
      padding: 20px;
      transition: 0.3s;
    }

    .menu.active { right: 0; }

    .menu a {
      display: block;
      margin: 20px 0;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
    }

    .product {
      padding: 20px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 12px;
      transition: 0.3s;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-top: 15px;
    }

    .price {
      font-size: 22px;
      font-weight: 700;
      margin: 10px 0;
    }

    .desc {
      font-size: 16px;
      opacity: 0.7;
    }

    .modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      width: 100%;
      height: 90%;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      transition: 0.3s;
      overflow-y: auto;
    }

    .modal.active { bottom: 0; }

    .sizes button {
      margin: 5px;
      padding: 10px;
      border: 1px solid #000;
      background: none;
      cursor: pointer;
    }

    .sizes button.active {
      background: #000;
      color: #fff;
    }

    .buy-btn {
      width: 100%;
      padding: 15px;
      background: #25D366;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ekklesía</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Sobre</a>
  <a href="#">Entrega</a>
  <a href="#">Contato</a>
</div>

<section class="product" onclick="openModal()">
  <img id="shirt" 
    src="SaveClip.App_653874286_18570368437007578_8379778417689073870_n.jpg" 
    onmouseover="this.src='SaveClip.App_654779195_18570368395007578_6053536714046664614_n.jpg'" 
    onmouseout="this.src='SaveClip.App_653874286_18570368437007578_8379778417689073870_n.jpg'">
</section>


  <div class="title">Camiseta Fé</div>
  <div class="price">R$ 79,90</div>
  <div class="desc">Minimalista, forte e cheia de significado.</div>
</section>

<div class="modal" id="modal">
  <h2>Camiseta Fé</h2>
  <p>Malha premium, confortável e resistente. Estampa durável.</p>

  <h3>Tamanho</h3>
  <div class="sizes">
    <button onclick="selectSize(this)">P</button>
    <button onclick="selectSize(this)">M</button>
    <button onclick="selectSize(this)">G</button>
    <button onclick="selectSize(this)">GG</button>
  </div>

  <h3>Pagamento</h3>
  <p>Pix, cartão ou dinheiro.</p>

  <button class="buy-btn" onclick="buy()">Finalizar no WhatsApp</button>
</div>

<script>
  function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
  }

  function openModal() {
    document.getElementById('modal').classList.add('active');
  }

  function selectSize(btn) {
    document.querySelectorAll('.sizes button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function buy() {
    const size = document.querySelector('.sizes button.active')?.innerText || 'não selecionado';
    const text = `Olá, quero comprar a Camiseta Fé - Tamanho: ${size}`;
    const url = `https://wa.me/5599999999999?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
  }
</script>

</body>
</html>
