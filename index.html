<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ekklesía</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #fff;
  color: #000;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 8%;
}

.logo {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 1px;
}

/* MENU DESKTOP */
.menu-btn {
  display: none;
}

.menu {
  position: static;
  display: flex;
  gap: 30px;
  background: none;
  color: #000;
  height: auto;
  width: auto;
  padding: 0;
}

.menu a {
  color: #000;
  text-decoration: none;
  font-size: 16px;
  position: relative;
}

.menu a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 2px;
  background: #000;
  left: 0;
  bottom: -4px;
  transition: 0.3s;
}

.menu a:hover::after {
  width: 100%;
}

/* PRODUCT */
.product {
  display: flex;
  gap: 60px;
  padding: 60px 8%;
  max-width: 1200px;
  margin: auto;
  align-items: center;
  cursor: pointer;
}

.product img {
  width: 500px;
  border-radius: 16px;
  transition: 0.4s;
}

.product img:hover {
  transform: scale(1.03);
}

.info {
  max-width: 400px;
}

.title {
  font-size: 40px;
  font-weight: 900;
  line-height: 1.1;
}

.price {
  font-size: 28px;
  font-weight: 700;
  margin: 20px 0;
}

.desc {
  font-size: 18px;
  opacity: 0.7;
}

/* MODAL DESKTOP */
.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 500px;
  height: auto;
  border-radius: 20px;
  padding: 30px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.modal.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: all;
}

.modal-header {
  margin-bottom: 20px;
}

.sizes button {
  margin: 5px;
  padding: 12px 18px;
  border: 1px solid #000;
  background: none;
  cursor: pointer;
  transition: 0.2s;
}

.sizes button:hover {
  background: #000;
  color: #fff;
}

.sizes button.active {
  background: #000;
  color: #fff;
}

.buy-btn {
  width: 100%;
  padding: 15px;
  background: #25D366;
  color: #fff;
  border: none;
  font-size: 18px;
  font-weight: bold;
  border-radius: 10px;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.buy-btn:hover {
  transform: scale(1.03);
}

/* BACKDROP */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.backdrop.active {
  opacity: 1;
  pointer-events: all;
}

/* RESPONSIVO (volta pro mobile bonitinho) */
@media (max-width: 768px) {

  .menu {
    position: fixed;
    top: 0;
    right: -100%;
    width: 70%;
    height: 100%;
    background: #000;
    color: #fff;
    flex-direction: column;
    padding: 20px;
    transition: 0.3s;
  }

  .menu.active {
    right: 0;
  }

  .menu a {
    color: #fff;
  }

  .menu-btn {
    display: block;
    font-size: 24px;
    cursor: pointer;
  }

  .product {
    flex-direction: column;
    padding: 20px;
  }

  .product img {
    width: 100%;
  }

  .title {
    font-size: 26px;
  }

  .modal {
    top: auto;
    bottom: -100%;
    left: 0;
    transform: none;
    width: 100%;
    height: 90%;
  }

  .modal.active {
    bottom: 0;
  }
}

  </style>
</head>
<body>

<header>
  <div class="logo">ekklesía</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <div class="menu-header">
    <div>Menu</div>
    <div class="close-btn" onclick="toggleMenu()">✕</div>
  </div>
  <a href="#">Sobre</a>
  <a href="#">Entrega</a>
  <a href="#">Contato</a>
</div>

<section class="product" onclick="openModal()">
  <img id="shirt" 
    src="SaveClip.App_653874286_18570368437007578_8379778417689073870_n.jpg" 
    onmouseover="this.src='SaveClip.App_654779195_18570368395007578_6053536714046664614_n.jpg'" 
    onmouseout="this.src='SaveClip.App_653874286_18570368437007578_8379778417689073870_n.jpg'">

  <div class="info">
    <div class="title">Camiseta The World is My Parish</div>
    <div class="price">R$ 150,90</div>
    <div class="desc">Camiseta Cristã EKKLESÍA</div>
  </div>
</section>

<!-- BACKDROP -->
<div class="backdrop" id="backdrop" onclick="closeModal()"></div>

<div class="modal" id="modal">
  <div class="modal-header">
    <h2>The World is My Parish</h2>
    <div class="close-btn" onclick="closeModal()">✕</div>
  </div>

  <p>Camiseta Cristã EKKLESÍA</p>

  <h3>Tamanho</h3>
  <div class="sizes">
    <button onclick="selectSize(this)">P</button>
    <button onclick="selectSize(this)">M</button>
    <button onclick="selectSize(this)">G</button>
    <button onclick="selectSize(this)">GG</button>
  </div>

  <button class="buy-btn" onclick="buy()">
    <span>📞</span> Finalizar no WhatsApp
  </button>
</div>

<script>
  function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
  }

  function openModal() {
    document.getElementById('modal').classList.add('active');
    document.getElementById('backdrop').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('backdrop').classList.remove('active');
  }

  function selectSize(btn) {
    document.querySelectorAll('.sizes button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function buy() {
    const size = document.querySelector('.sizes button.active')?.innerText || 'não selecionado';
    const text = `Olá, quero comprar a Camiseta Ekklesía - Tamanho: ${size}`;
    const url = `https://wa.me/5541997453188?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
  }
</script>

</body>
</html>
